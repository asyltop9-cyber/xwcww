<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальная библиотека</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b0c10 0%, #1a1e2a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        /* Переключение страниц */
        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .page.active {
            display: block;
            opacity: 1;
        }

        /* Главная страница */
        #home {
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px cyan, 0 0 20px blue;
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px cyan, 0 0 20px blue; }
            50% { text-shadow: 0 0 20px magenta, 0 0 40px purple; }
            100% { text-shadow: 0 0 10px cyan, 0 0 20px blue; }
        }

        .description {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            color: #ccc;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #2a2f3b;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px cyan;
        }

        .back-btn {
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            font-size: 1.2rem;
            padding: 8px 20px;
            border-radius: 30px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 20px cyan;
        }

        /* Синтезатор — пианино */
        .piano {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 30px 0 40px;
            user-select: none;
            flex-wrap: wrap;
        }

        .white-key {
            width: 70px;
            height: 250px;
            background: #f0f0f0;
            border: 1px solid #333;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 5px 0 #aaa, 0 0 10px rgba(255, 255, 255, 0.3);
            color: #333;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .black-key {
            position: absolute;
            width: 45px;
            height: 150px;
            background: #1e1e1e;
            border-radius: 0 0 6px 6px;
            box-shadow: 0 5px 0 #000, 0 0 15px cyan;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            transition: all 0.1s ease;
            cursor: pointer;
            z-index: 2;
            top: 0;
        }

        /* Позиции чёрных клавиш */
        .black-key[data-note="C#4"] { left: 50px; }
        .black-key[data-note="D#4"] { left: 120px; }
        .black-key[data-note="F#4"] { left: 260px; }
        .black-key[data-note="G#4"] { left: 330px; }
        .black-key[data-note="A#4"] { left: 400px; }

        .white-key.active, .black-key.active {
            transform: scale(0.95);
            background: #bbdefb;
            box-shadow: 0 0 25px deepskyblue;
        }
        .black-key.active {
            background: #2b2b2b;
            box-shadow: 0 0 25px magenta;
        }

        /* Барабаны */
        .drum-pad {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }

        .drum {
            width: 150px;
            height: 150px;
            border: none;
            border-radius: 20px;
            background: #2a2f3b;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 0 15px lime, 0 5px 0 #1e4d1e;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drum small {
            font-size: 1rem;
            color: #aaa;
            margin-top: 10px;
        }

        .drum.active {
            transform: scale(0.9);
            box-shadow: 0 0 30px lime, 0 2px 0 #1e4d1e;
            background: #3a4050;
        }

        /* Музыкальный плеер */
        .music-player {
            margin: 40px 0 20px;
            padding: 25px;
            background: rgba(20, 25, 35, 0.8);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .player-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: cyan;
            text-shadow: 0 0 10px cyan;
        }

        .track-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .track-card {
            background: linear-gradient(145deg, #1e2433, #131823);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .track-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .track-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
            border-color: cyan;
        }

        .track-card:hover::before {
            left: 100%;
        }

        .track-card.playing {
            background: linear-gradient(145deg, #2a3347, #1a2337);
            border-color: magenta;
            box-shadow: 0 0 30px magenta;
        }

        .track-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: white;
        }

        .track-artist {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .track-duration {
            font-size: 0.8rem;
            color: cyan;
            font-family: monospace;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
            padding: 15px;
            background: rgba(10, 15, 25, 0.6);
            border-radius: 60px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
        }

        .control-btn:hover {
            transform: scale(1.1);
            text-shadow: 0 0 15px cyan;
        }

        .control-btn.play-pause {
            background: cyan;
            color: #0b0c10;
            width: 70px;
            height: 70px;
            font-size: 2.2rem;
            box-shadow: 0 0 30px cyan;
        }

        .control-btn.play-pause:hover {
            transform: scale(1.15);
            box-shadow: 0 0 50px cyan;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin: 0 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, cyan, magenta);
            border-radius: 3px;
            width: 0%;
            position: relative;
            transition: width 0.1s linear;
        }

        .time-display {
            font-family: monospace;
            font-size: 1rem;
            color: cyan;
            min-width: 100px;
            text-align: center;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: cyan;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px cyan;
        }

        .volume-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: cyan;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px cyan;
        }

        .now-playing {
            text-align: center;
            margin-bottom: 15px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .now-playing span {
            color: cyan;
            font-weight: bold;
        }

        /* Визуализация */
        #visualizer {
            display: block;
            margin: 30px auto 0;
            width: 100%;
            max-width: 600px;
            height: 150px;
            background: #0f1117;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .white-key { width: 50px; height: 180px; font-size: 0.8rem; }
            .black-key { width: 30px; height: 110px; font-size: 0.7rem; }
            .black-key[data-note="C#4"] { left: 35px; }
            .black-key[data-note="D#4"] { left: 85px; }
            .black-key[data-note="F#4"] { left: 185px; }
            .black-key[data-note="G#4"] { left: 235px; }
            .black-key[data-note="A#4"] { left: 285px; }
            .drum { width: 120px; height: 120px; font-size: 1.4rem; }
            .player-controls { flex-wrap: wrap; }
            .progress-bar { order: 3; width: 100%; margin: 10px 0; }
            .volume-control { margin-left: 0; }
        }

        @media (max-width: 480px) {
            .piano { overflow-x: auto; justify-content: flex-start; }
            .white-key { min-width: 45px; }
            .black-key { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главная страница -->
        <section id="home" class="page active">
            <h1 class="glow">Музыкальная библиотека</h1>
            <p class="description">Сайт для изучения и игры на виртуальных музыкальных инструментах</p>
            
            <!-- Музыкальный плеер на главной -->
            <div class="music-player">
                <div class="player-title">🎵 Музыкальная коллекция</div>
                <div class="now-playing" id="nowPlaying">Сейчас не играет</div>
                <div class="track-list" id="trackList"></div>
                <div class="player-controls">
                    <button class="control-btn" id="prevTrack">⏮️</button>
                    <button class="control-btn play-pause" id="playPause">▶️</button>
                    <button class="control-btn" id="nextTrack">⏭️</button>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                    </div>
                </div>
            </div>

            <div class="nav-buttons">
                <button class="nav-btn" data-target="synth">🎹 Синтезатор</button>
                <button class="nav-btn" data-target="drums">🥁 Барабаны</button>
            </div>
        </section>

        <!-- Секция синтезатора -->
        <section id="synth" class="page">
            <h2>Синтезатор</h2>
            <button class="back-btn">← Назад</button>
            <!-- Виртуальная клавиатура -->
            <div class="piano">
                <!-- Белые клавиши -->
                <div class="white-key" data-note="C4" data-key="A">A</div>
                <div class="white-key" data-note="D4" data-key="S">S</div>
                <div class="white-key" data-note="E4" data-key="D">D</div>
                <div class="white-key" data-note="F4" data-key="F">F</div>
                <div class="white-key" data-note="G4" data-key="G">G</div>
                <div class="white-key" data-note="A4" data-key="H">H</div>
                <div class="white-key" data-note="B4" data-key="J">J</div>
                <div class="white-key" data-note="C5" data-key="K">K</div>
                <!-- Чёрные клавиши -->
                <div class="black-key" data-note="C#4" data-key="W">W</div>
                <div class="black-key" data-note="D#4" data-key="E">E</div>
                <div class="black-key" data-note="F#4" data-key="T">T</div>
                <div class="black-key" data-note="G#4" data-key="Y">Y</div>
                <div class="black-key" data-note="A#4" data-key="U">U</div>
            </div>
        </section>

        <!-- Секция барабанов -->
        <section id="drums" class="page">
            <h2>Барабаны</h2>
            <button class="back-btn">← Назад</button>
            <div class="drum-pad">
                <button class="drum" data-sound="kick" data-key="A">Kick<br><small>(A)</small></button>
                <button class="drum" data-sound="snare" data-key="S">Snare<br><small>(S)</small></button>
                <button class="drum" data-sound="hihat" data-key="D">Hi-Hat<br><small>(D)</small></button>
                <button class="drum" data-sound="clap" data-key="F">Clap<br><small>(F)</small></button>
                <button class="drum" data-sound="tom" data-key="G">Tom<br><small>(G)</small></button>
            </div>
        </section>

        <!-- Общий холст для визуализации звука -->
        <canvas id="visualizer" width="600" height="150"></canvas>
    </div>

    <script>
        (function() {
            // ---------- Инициализация аудиоконтекста и анализатора ----------
            let audioCtx;
            const activeOscillators = new Map(); // Для синтезатора
            let analyser;
            let canvas = document.getElementById('visualizer');
            let canvasCtx = canvas.getContext('2d');
            let animationFrame;
            let audioReady = false;

            // ---------- Музыкальный плеер ----------
            class MusicPlayer {
                constructor() {
                    this.tracks = [
                        { name: 'Космическая симфония', artist: 'Электронный оркестр', duration: 185, url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
                        { name: 'Ночной джаз', artist: 'Луна-блюз', duration: 223, url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
                        { name: 'Электронная волна', artist: 'Cyber Pulse', duration: 198, url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
                        { name: 'Акустическая баллада', artist: 'Гитара и тишина', duration: 212, url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3' },
                        { name: 'Рок-легенда', artist: 'Бешеные гитары', duration: 245, url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3' },
                        { name: 'Эмбиент', artist: 'Космический фон', duration: 267, url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3' }
                    ];
                    
                    this.currentTrackIndex = 0;
                    this.isPlaying = false;
                    this.audio = null;
                    this.volume = 0.7;
                    
                    this.init();
                }

                init() {
                    this.renderTrackList();
                    this.setupEventListeners();
                }

                renderTrackList() {
                    const trackList = document.getElementById('trackList');
                    trackList.innerHTML = '';
                    
                    this.tracks.forEach((track, index) => {
                        const trackCard = document.createElement('div');
                        trackCard.className = 'track-card';
                        trackCard.dataset.index = index;
                        
                        const minutes = Math.floor(track.duration / 60);
                        const seconds = track.duration % 60;
                        
                        trackCard.innerHTML = `
                            <div class="track-name">${track.name}</div>
                            <div class="track-artist">${track.artist}</div>
                            <div class="track-duration">${minutes}:${seconds.toString().padStart(2, '0')}</div>
                        `;
                        
                        trackCard.addEventListener('click', () => this.playTrack(index));
                        trackList.appendChild(trackCard);
                    });
                }

                setupEventListeners() {
                    document.getElementById('playPause').addEventListener('click', () => this.togglePlayPause());
                    document.getElementById('prevTrack').addEventListener('click', () => this.prevTrack());
                    document.getElementById('nextTrack').addEventListener('click', () => this.nextTrack());
                    
                    const volumeSlider = document.getElementById('volumeSlider');
                    volumeSlider.addEventListener('input', (e) => {
                        this.volume = parseFloat(e.target.value);
                        if (this.audio) {
                            this.audio.volume = this.volume;
                        }
                    });

                    const progressBar = document.getElementById('progressBar');
                    progressBar.addEventListener('click', (e) => {
                        if (!this.audio) return;
                        const rect = progressBar.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        this.audio.currentTime = percent * this.audio.duration;
                    });
                }

                playTrack(index) {
                    // Останавливаем текущее воспроизведение
                    if (this.audio) {
                        this.audio.pause();
                        this.audio = null;
                    }

                    this.currentTrackIndex = index;
                    
                    // Создаём новый аудио элемент
                    this.audio = new Audio(this.tracks[index].url);
                    this.audio.volume = this.volume;
                    
                    // Подключаем к анализатору, если аудиоконтекст создан
                    if (audioReady && audioCtx) {
                        const source = audioCtx.createMediaElementSource(this.audio);
                        source.connect(analyser);
                        analyser.connect(audioCtx.destination);
                    }
                    
                    // Обновляем UI
                    this.updateNowPlaying();
                    this.updateActiveTrack();
                    
                    // Воспроизводим
                    this.audio.play();
                    this.isPlaying = true;
                    this.updatePlayPauseButton();
                    
                    // Обработчики событий
                    this.audio.addEventListener('timeupdate', () => this.updateProgress());
                    this.audio.addEventListener('ended', () => this.nextTrack());
                }

                togglePlayPause() {
                    if (!this.audio) {
                        this.playTrack(0);
                        return;
                    }
                    
                    if (this.isPlaying) {
                        this.audio.pause();
                    } else {
                        this.audio.play();
                    }
                    
                    this.isPlaying = !this.isPlaying;
                    this.updatePlayPauseButton();
                }

                prevTrack() {
                    let newIndex = this.currentTrackIndex - 1;
                    if (newIndex < 0) newIndex = this.tracks.length - 1;
                    this.playTrack(newIndex);
                }

                nextTrack() {
                    let newIndex = this.currentTrackIndex + 1;
                    if (newIndex >= this.tracks.length) newIndex = 0;
                    this.playTrack(newIndex);
                }

                updatePlayPauseButton() {
                    const btn = document.getElementById('playPause');
                    btn.textContent = this.isPlaying ? '⏸️' : '▶️';
                }

                updateNowPlaying() {
                    const track = this.tracks[this.currentTrackIndex];
                    document.getElementById('nowPlaying').innerHTML = `Сейчас играет: <span>${track.name} — ${track.artist}</span>`;
                }

                updateActiveTrack() {
                    document.querySelectorAll('.track-card').forEach(card => {
                        card.classList.remove('playing');
                    });
                    const activeCard = document.querySelector(`.track-card[data-index="${this.currentTrackIndex}"]`);
                    if (activeCard) {
                        activeCard.classList.add('playing');
                    }
                }

                updateProgress() {
                    if (!this.audio) return;
                    
                    const current = this.audio.currentTime;
                    const duration = this.audio.duration;
                    const percent = (current / duration) * 100;
                    
                    document.getElementById('progressFill').style.width = `${percent}%`;
                    
                    const currentMin = Math.floor(current / 60);
                    const currentSec = Math.floor(current % 60);
                    const totalMin = Math.floor(duration / 60);
                    const totalSec = Math.floor(duration % 60);
                    
                    document.getElementById('timeDisplay').textContent = 
                        `${currentMin}:${currentSec.toString().padStart(2, '0')} / ${totalMin}:${totalSec.toString().padStart(2, '0')}`;
                }
            }

            // ---------- Функции синтезатора и барабанов ----------
            function initAudio() {
                if (audioReady) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.connect(audioCtx.destination);
                audioReady = true;
                startVisualization();
            }

            function startVisualization() {
                if (!analyser) return;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function draw() {
                    if (!canvas || !canvasCtx) return;
                    animationFrame = requestAnimationFrame(draw);

                    analyser.getByteFrequencyData(dataArray);

                    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                    canvasCtx.fillStyle = '#0f1117';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                    const barWidth = (canvas.width / bufferLength) * 2.5;
                    let x = 0;

                    for (let i = 0; i < bufferLength; i++) {
                        const barHeight = dataArray[i] / 255 * canvas.height;
                        const hue = i / bufferLength * 180 + 200;
                        canvasCtx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                        canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth + 1;
                    }
                }
                draw();
            }

            function noteToFrequency(note) {
                const notes = {
                    'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
                    'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
                    'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
                    'C5': 523.25
                };
                return notes[note] || 440;
            }

            function playSynthNote(note, keyElement) {
                if (!audioReady) initAudio();
                if (!audioCtx) return;

                const freq = noteToFrequency(note);
                const now = audioCtx.currentTime;

                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                osc.type = 'sawtooth';
                osc.frequency.value = freq;

                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

                osc.connect(gainNode);
                gainNode.connect(analyser);

                osc.start(now);
                osc.stop(now + 1.5);

                if (!activeOscillators.has(note)) {
                    activeOscillators.set(note, new Set());
                }
                const oscSet = activeOscillators.get(note);
                oscSet.add({ osc, gainNode });

                osc.onended = () => {
                    if (oscSet) {
                        oscSet.delete({ osc, gainNode });
                        if (oscSet.size === 0) activeOscillators.delete(note);
                    }
                };

                if (keyElement) {
                    keyElement.classList.add('active');
                    setTimeout(() => {
                        keyElement.classList.remove('active');
                    }, 150);
                }
            }

            function stopSynthNote(note) {
                if (!audioCtx || !activeOscillators.has(note)) return;
                const oscSet = activeOscillators.get(note);
                const now = audioCtx.currentTime;
                oscSet.forEach(({ osc, gainNode }) => {
                    gainNode.gain.cancelScheduledValues(now);
                    gainNode.gain.setValueAtTime(gainNode.gain.value, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.stop(now + 0.05);
                });
                activeOscillators.delete(note);
            }

            function playDrumSound(type, keyElement) {
                if (!audioReady) initAudio();
                if (!audioCtx) return;

                const now = audioCtx.currentTime;

                function createNoiseBuffer() {
                    const bufferSize = audioCtx.sampleRate * 0.5;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    return buffer;
                }

                if (type === 'kick') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                    gain.gain.setValueAtTime(0.8, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.connect(gain);
                    gain.connect(analyser);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else if (type === 'snare') {
                    const noiseBuffer = createNoiseBuffer();
                    const noiseSource = audioCtx.createBufferSource();
                    noiseSource.buffer = noiseBuffer;
                    const noiseGain = audioCtx.createGain();
                    noiseGain.gain.setValueAtTime(0.5, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    noiseSource.connect(noiseGain);
                    noiseGain.connect(analyser);

                    const osc = audioCtx.createOscillator();
                    const oscGain = audioCtx.createGain();
                    osc.frequency.value = 200;
                    oscGain.gain.setValueAtTime(0.3, now);
                    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.connect(oscGain);
                    oscGain.connect(analyser);

                    noiseSource.start(now);
                    osc.start(now);
                    noiseSource.stop(now + 0.2);
                    osc.stop(now + 0.1);
                } else if (type === 'hihat') {
                    const noiseBuffer = createNoiseBuffer();
                    const noiseSource = audioCtx.createBufferSource();
                    noiseSource.buffer = noiseBuffer;
                    const noiseGain = audioCtx.createGain();
                    noiseGain.gain.setValueAtTime(0.4, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    noiseSource.connect(noiseGain);
                    noiseGain.connect(analyser);
                    noiseSource.start(now);
                    noiseSource.stop(now + 0.1);
                } else if (type === 'clap') {
                    for (let i = 0; i < 3; i++) {
                        const noiseBuffer = createNoiseBuffer();
                        const noiseSource = audioCtx.createBufferSource();
                        noiseSource.buffer = noiseBuffer;
                        const noiseGain = audioCtx.createGain();
                        const delay = i * 0.02;
                        noiseGain.gain.setValueAtTime(0.3, now + delay);
                        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.05);
                        noiseSource.connect(noiseGain);
                        noiseGain.connect(analyser);
                        noiseSource.start(now + delay);
                        noiseSource.stop(now + delay + 0.05);
                    }
                } else if (type === 'tom') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 250;
                    gain.gain.setValueAtTime(0.7, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.connect(gain);
                    gain.connect(analyser);
                    osc.start(now);
                    osc.stop(now + 0.3);
                }

                if (keyElement) {
                    keyElement.classList.add('active');
                    setTimeout(() => {
                        keyElement.classList.remove('active');
                    }, 150);
                }
            }

            // ---------- Инициализация ----------
            function setupSynthEvents() {
                const keys = document.querySelectorAll('#synth .white-key, #synth .black-key');
                keys.forEach(key => {
                    const note = key.dataset.note;
                    key.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        playSynthNote(note, key);
                    });
                    key.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        playSynthNote(note, key);
                    });
                });
            }

            function setupDrumsEvents() {
                const drums = document.querySelectorAll('#drums .drum');
                drums.forEach(drum => {
                    const sound = drum.dataset.sound;
                    drum.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        playDrumSound(sound, drum);
                    });
                    drum.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        playDrumSound(sound, drum);
                    });
                });
            }

            function handleKeyDown(e) {
                const key = e.key.toUpperCase();
                if (e.repeat) return;

                const activePage = document.querySelector('.page.active');
                if (!activePage) return;

                if (activePage.id === 'synth') {
                    const keyElement = document.querySelector(`#synth [data-key="${key}"]`);
                    if (keyElement) {
                        e.preventDefault();
                        const note = keyElement.dataset.note;
                        playSynthNote(note, keyElement);
                    }
                } else if (activePage.id === 'drums') {
                    const drumElement = document.querySelector(`#drums [data-key="${key}"]`);
                    if (drumElement) {
                        e.preventDefault();
                        const sound = drumElement.dataset.sound;
                        playDrumSound(sound, drumElement);
                    }
                }
            }

            function handleKeyUp(e) {
                const key = e.key.toUpperCase();
                const activePage = document.querySelector('.page.active');
                if (!activePage) return;

                if (activePage.id === 'synth') {
                    const keyElement = document.querySelector(`#synth [data-key="${key}"]`);
                    if (keyElement) {
                        e.preventDefault();
                        const note = keyElement.dataset.note;
                        stopSynthNote(note);
                    }
                }
            }

            // Навигация
            const homePage = document.getElementById('home');
            const synthPage = document.getElementById('synth');
            const drumsPage = document.getElementById('drums');
            const backBtns = document.querySelectorAll('.back-btn');
            const navBtns = document.querySelectorAll('.nav-btn');

            function showPage(pageId) {
                homePage.classList.remove('active');
                synthPage.classList.remove('active');
                drumsPage.classList.remove('active');
                document.getElementById(pageId).classList.add('active');
            }

            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.target;
                    showPage(target);
                });
            });

            backBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    showPage('home');
                });
            });

            // Запуск
            document.addEventListener('DOMContentLoaded', () => {
                setupSynthEvents();
                setupDrumsEvents();
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                
                // Создаём музыкальный плеер
                const player = new MusicPlayer();
            });
        })();
    </script>
